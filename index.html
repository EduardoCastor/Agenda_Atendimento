<form id="formAtendimento">
  <input type="text" name="nome" placeholder="Seu nome" required>
  <input type="email" name="email" placeholder="Seu e-mail" required>
  <textarea name="assunto" placeholder="Descreva o atendimento" required></textarea>

  <!-- NOVO: Data -->
  <label>Escolha a data</label>
  <input type="date" id="data" required>

  <!-- NOVO: Horários -->
  <label>Horários disponíveis</label>
  <select id="horarios" required>
    <option value="">Carregando horários...</option>
  </select>

  <button type="submit">Agendar Atendimento</button>
</form>

<div id="status" class="hidden">
  ✅ Atendimento agendado com sucesso!<br>
  Compareça no horário selecionado.
</div>
